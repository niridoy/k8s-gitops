apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/niridoy/k8s-gitops.git
    targetRevision: main
    path: argocd/applications/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy: {}
