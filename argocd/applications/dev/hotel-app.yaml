apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hotel-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/niridoy/k8s-gitops.git
    targetRevision: main
    path: sample-php/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: hotel-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
