resources:
  - ../../base

configMapGenerator:
  - name: local-mysql-gateway
    envs:
      - gateway.env
    options:
      disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: local-mysql-gateway
      fieldPath: data.MYSQL_GATEWAY_IP
    targets:
      - select:
          kind: Deployment
          name: product-service
        fieldPaths:
          - spec.template.spec.hostAliases.0.ip

patches:
  - path: patch.yaml
