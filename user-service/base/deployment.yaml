deployment.yamlapiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/my-org/user-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: "base"
