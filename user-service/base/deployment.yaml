apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: user-service
          image: ghcr.io/niridoy/rocket-user-service:latest

          ports:
            - containerPort: 8181

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
